name: Build Firmware

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  esp32:
    name: Build ESP32-S2 Flipper Firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build ESP32
        working-directory: esp32
        run: pio run

      - name: Package ESP32 binaries
        run: |
          mkdir -p release/esp32
          find esp32/.pio -name "*.bin" -exec cp {} release/esp32/ \;

      - name: Upload ESP32 files
        uses: actions/upload-artifact@v4
        with:
          name: flipper-zero-esp32
          path: release/esp32


  pico2:
    name: Build Pico 2 Firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y cmake gcc-arm-none-eabi build-essential

      - name: Build Pico
        if: hashFiles('pico2/CMakeLists.txt') != ''
        working-directory: pico2
        run: |
          mkdir build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Upload Pico build
        uses: actions/upload-artifact@v4
        with:
          name: pico2-firmware
          path: pico2/build


  release:
    name: Make Flash Package
    needs: esp32
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: flipper-zero-esp32
          path: firmware

      - name: Create ZIP
        run: |
          zip -r flipper-zero-web-bridge.zip firmware

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: flipper-zero-web-bridge-release
          path: flipper-zero-web-bridge.zip
